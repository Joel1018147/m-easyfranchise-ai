<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>M-EasyDo — Sign In</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--navy:#0d1b2a;--blue:#1a73e8;--blue2:#1557b0;--border:#dce3ec;--bg:#f0f4f8;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#fff;border:1px solid var(--border);border-radius:16px;padding:40px 32px;width:100%;max-width:380px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
.logo{display:inline-flex;align-items:center;gap:10px;margin-bottom:28px;}
.logo-dot{width:36px;height:36px;border-radius:10px;background:var(--blue);color:#fff;font-size:18px;font-weight:800;display:flex;align-items:center;justify-content:center;}
.logo-text{font-size:20px;font-weight:800;color:var(--navy);letter-spacing:-0.5px;}
h1{font-size:22px;font-weight:800;color:var(--navy);margin-bottom:8px;}
p{font-size:14px;color:#6b7a8d;margin-bottom:32px;line-height:1.5;}
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;width:100%;padding:14px 20px;background:#fff;border:1px solid var(--border);border-radius:10px;font-size:15px;font-weight:600;color:var(--navy);text-decoration:none;cursor:pointer;transition:background 0.15s,box-shadow 0.15s;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.btn-google:hover{background:#f8faff;box-shadow:0 2px 8px rgba(26,115,232,0.15);border-color:#a8c4f5;}
.btn-google:active{background:#f0f4ff;}
.google-icon{width:20px;height:20px;flex-shrink:0;}
.divider{margin:24px 0;display:flex;align-items:center;gap:12px;color:#adb5bd;font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.footer{margin-top:28px;font-size:12px;color:#adb5bd;line-height:1.6;}
.error{background:#fce4e4;border:1px solid #f5c6c6;color:#c62828;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:20px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-dot">S</div>
    <span class="logo-text">M-EasyDo</span>
  </div>

  <h1>Welcome back</h1>
  <p>Sign in with your Google account to access your CRM workspace.</p>

  <!-- Error message if auth failed -->
  <div id="error-msg" class="error" style="display:none;"></div>

  <a href="/auth/google" class="btn-google">
    <!-- Google G logo -->
    <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </a>

  <div class="footer">
    Your data is stored securely and privately.<br>
    Each Google account gets its own isolated workspace.
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  if (params.get('error') === 'auth_failed') {
    const el = document.getElementById('error-msg');
    el.textContent = 'Sign-in failed. Please try again.';
    el.style.display = 'block';
  }
  // Preserve redirect param in sessionStorage so app.html can pick it up after login
  const redirectTo = params.get('redirect');
  if (redirectTo) {
    sessionStorage.setItem('measydo_redirect', redirectTo);
    // Also update Google OAuth link to pass redirect param if present
    const googleBtn = document.querySelector('a[href="/auth/google"]');
    if (googleBtn) googleBtn.href = '/auth/google?redirect=' + encodeURIComponent(redirectTo);
  }
</script>
</body>
</html>
